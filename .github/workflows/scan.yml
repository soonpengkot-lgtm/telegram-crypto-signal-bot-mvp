name: SMC Signal Scan

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes (UTC)
  workflow_dispatch:           # manual trigger + self-dispatch chain

concurrency:
  group: smc-scan
  cancel-in-progress: false   # let sleeping run finish so self-dispatch fires

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # commit state back
      actions: write           # self-dispatch next run

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SMC scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save signal state
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > data/last_run.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push

